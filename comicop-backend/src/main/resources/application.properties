# Server configuration
server.port=${PORT:8080}

# Primary datasource (Local PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/comicop
spring.datasource.username=postgres
spring.datasource.password=209003

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.messages.basename=i18n/messages
spring.thymeleaf.encoding=UTF-8

# =============================================
# CẤU HÌNH JWT
# =============================================
# Secret key để ký JWT token — phải đủ dài (ít nhất 32 ký tự)
jwt.secret=comicop-super-secret-key-2024-very-long-string
# Thời gian hết hạn token: 86400000ms = 24 giờ
jwt.expiration=86400000